name: Release & Publish

on:
  push:
    branches:
      - main
      - master

permissions:
  contents: write

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get_version.outputs.version }}
      tag_exists: ${{ steps.check_tag.outputs.exists }}
    steps:
      - uses: actions/checkout@v4
      - name: Get version
        id: get_version
        run: |
          VERSION=$(grep "^version" go.mod | head -n 1 | awk '{print $2}' | tr -d '()')
          if [ -z "$VERSION" ]; then
            VERSION=$(grep -m1 "^// version" main.go | awk '{print $3}')
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
      - name: Check Tag
        id: check_tag
        run: |
          git fetch --tags
          if git rev-parse "v${{ steps.get_version.outputs.version }}" >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

  build-binaries:
    needs: check-version
    if: needs.check-version.outputs.tag_exists == 'false'
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # --- LINUX ---
          # Standard Server/Desktop (x86_64)
          - os: ubuntu-latest
            target: linux/amd64
            asset_name: git-mcp-go-linux-x86_64

          # ARM64 (Raspberry Pi 4, AWS Graviton)
          - os: ubuntu-latest
            target: linux/arm64
            asset_name: git-mcp-go-linux-aarch64

          # ARMv7 (Raspberry Pi 2/3)
          - os: ubuntu-latest
            target: linux/arm
            asset_name: git-mcp-go-linux-armv7
            goarch: arm
            goarm: "7"

          # --- MACOS ---
          # Apple Silicon (M1/M2/M3)
          - os: macos-latest
            target: darwin/arm64
            asset_name: git-mcp-go-darwin-aarch64

          # Intel Mac
          - os: macos-latest
            target: darwin/amd64
            asset_name: git-mcp-go-darwin-x86_64

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Build Binary
        env:
          GOOS: ${{ matrix.goarch == 'arm' && 'linux' || split(matrix.target, '/')[0] }}
          GOARCH: ${{ matrix.goarch || split(matrix.target, '/')[1] }}
          GOARM: ${{ matrix.goarm || '' }}
        run: |
          go build -ldflags="-s -w" -o ${{ matrix.asset_name }}

      - name: Prepare Asset
        shell: bash
        run: |
          chmod +x ${{ matrix.asset_name }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.asset_name }}
          path: ${{ matrix.asset_name }}

  create-release:
    needs: [check-version, build-binaries]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: binary-*
          merge-multiple: true

      - name: Generate Changelog
        uses: orhun/git-cliff-action@v4
        id: git_cliff
        with:
          config: .github/external/cliff.toml
          args: --verbose --tag v${{ needs.check-version.outputs.version }} --strip header
        env:
          OUTPUT: CHANGELOG.md

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ needs.check-version.outputs.version }}
          name: Release v${{ needs.check-version.outputs.version }}
          body: ${{ steps.git_cliff.outputs.content }}
          files: |
            git-mcp-go-linux-x86_64
            git-mcp-go-linux-aarch64
            git-mcp-go-linux-armv7
            git-mcp-go-darwin-aarch64
            git-mcp-go-darwin-x86_64
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
